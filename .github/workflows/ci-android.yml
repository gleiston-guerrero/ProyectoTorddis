name: ci-android

on:
  push:
    branches: [main]
    paths:
      - 'src/mobile-app/**'
      - '.github/workflows/ci-android.yml'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        working-directory: src/mobile-app
        run: |
          if [ -f gradlew ]; then chmod +x gradlew; fi

      - name: Build debug APK
        working-directory: src/mobile-app
        run: |
          if [ -f gradlew ]; then ./gradlew assembleDebug --no-daemon; else echo "gradlew not present in this checkout; skipping build"; fi

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: torddis-debug-apk
          path: src/mobile-app/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
